<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dra. Laura Quintanar — Redes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rosa: #E8357A;
    --teal: #4BC4E0;
    --crema: #FAF7F4;
    --negro: #1A1A1A;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--crema);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  .page {
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .mark {
    width: 150px;
    margin-bottom: 18px;
  }

  .mark img { width: 100%; height: auto; display: block; }

  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    color: var(--rosa);
    font-size: 26px;
    line-height: 1.25;
    margin: 0 0 6px;
  }

  .subtitle {
    font-size: 14px;
    color: #6b6b6b;
    margin: 0 0 36px;
    letter-spacing: 0.2px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 14px;
    width: 100%;
    padding: 16px 22px;
    border-radius: 999px;
    background: var(--rosa);
    color: #fff;
    text-decoration: none;
    font-weight: 700;
    font-size: 16px;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  .pill:active { transform: scale(0.97); opacity: 0.9; }

  .pill.tiktok { background: var(--negro); }
  .pill.instagram { background: linear-gradient(135deg, var(--rosa), #c0265f); }
  .pill.location { background: var(--teal); }

  .pill .icon {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.18);
    border-radius: 50%;
  }

  .pill .icon svg { width: 14px; height: 14px; }

  .accent-line {
    width: 40px;
    height: 3px;
    background: var(--teal);
    border-radius: 2px;
    margin: 32px 0 22px;
  }

  footer {
    font-size: 12px;
    color: #9a9a9a;
  }

  footer strong { color: var(--negro); }
</style>
</head>
